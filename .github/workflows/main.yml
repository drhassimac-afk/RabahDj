name: Build React Native Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: 📦 Install Dependencies
        run: |
          cd app
          npm install --legacy-peer-deps

      - name: 🧹 Clean Previous Native Directories
        run: |
          rm -rf app/android

      - name: 🏗️ Generate Android Folder (Expo Prebuild)
        run: |
          cd app
          npx expo prebuild --platform android --clean

      # الطريقة الرسمية في Expo SDK 54 لدمج كود الـ JS والصور إجبارياً داخل ملف البناء بدون مسارات يدوية معقدة
      - name: 📦 Expo Export Embed
        run: |
          cd app
          npx expo export:embed --platform android --dev false --clear

      # بناء نسخة Release حقيقية ومستقلة تحتوي على كافة أزرار وتعديلات الملفات
      - name: 🚀 Build Android Release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false"
        run: |
          cd app/android
          ./gradlew clean assembleRelease --no-daemon

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RabahDj-App-Final
          path: app/android/app/build/outputs/apk/release/app-release.apk
