name: Generate and Build Clean Flutter App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🏗️ Create Fresh Flutter Project
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' -exec rm -rf {} +
          flutter create . --org com.example --project-name rabahdj_local_app --platforms=android --overwrite

      - name: 📝 Inject Target pubspec.yaml Dependencies
        run: |
          cat << 'EOF' > pubspec.yaml
          name: rabahdj_local_app
          description: "Advanced Local Social App with Profile & Local File Sharing Hub."
          publish_to: 'none'
          version: 1.7.0+8

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            flutter_local_notifications: ^22.0.1
            socket_io_client: ^3.1.1
            uuid: ^4.3.3
            video_player: ^2.9.2
            http: ^1.2.0
            image_picker: ^1.1.2
            file_picker: ^8.1.4
            sqflite: ^2.3.0
            path: ^1.8.3
            nsd: ^1.2.2

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: 📲 Inject Ultra App UI with Profile & WiFi File Sharing Hub
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_local_notifications/flutter_local_notifications.dart';
          import 'package:socket_io_client/socket_io_client.dart' as IO;
          import 'package:uuid/uuid.dart';
          import 'package:http/http.dart' as http;
          import 'package:image_picker/image_picker.dart';
          import 'package:file_picker/file_picker.dart';
          import 'dart:convert';
          import 'dart:io';

          final FlutterLocalNotificationsPlugin _localNotificationsPlugin = FlutterLocalNotificationsPlugin();
          IO.Socket? socket;
          String currentServerIp = "192.168.1.10";
          List<Map<String, dynamic>> activeUsersList = []; 
          String myUsername = "مستخدم محلي";
          String? myProfileB64;
          String? myCoverB64;

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            const AndroidInitializationSettings initializationSettingsAndroid = AndroidInitializationSettings('@mipmap/ic_launcher');
            const InitializationSettings initializationSettings = InitializationSettings(android: initializationSettingsAndroid);
            
            // تصحيح التمرير ليتوافق مع النسخة v22+ ويمنع فشل البناء
            await _localNotificationsPlugin.initialize(
              initializationSettings: initializationSettings,
            );
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFF1877F2), brightness: Brightness.dark),
                  useMaterial3: true, scaffoldBackgroundColor: const Color(0xFF18191A),
                ),
                home: const MainNavigationScreen(),
              );
            }
          }

          class MainNavigationScreen extends StatefulWidget {
            const MainNavigationScreen({super.key});
            @override
            State<MainNavigationScreen> createState() => _MainNavigationScreenState();
          }

          class _MainNavigationScreenState extends State<MainNavigationScreen> {
            int _currentIndex = 0; bool _isConnected = false;
            final TextEditingController _ipController = TextEditingController(text: currentServerIp);
            final TextEditingController _nameController = TextEditingController(text: myUsername);

            void connectToServer() {
              if (socket != null) { socket!.disconnect(); socket!.dispose(); }
              setState(() { currentServerIp = _ipController.text.trim(); myUsername = _nameController.text.trim(); });

              socket = IO.io('http://$currentServerIp:4000', IO.OptionBuilder().setTransports(['websocket']).disableAutoConnect().build());
              socket!.connect();

              socket!.onConnect((_) {
                setState(() => _isConnected = true);
                socket!.emit('join', {'username': myUsername, 'profile': myProfileB64, 'cover': myCoverB64});
              });
              socket!.onDisconnect((_) => setState(() => _isConnected = false));

              socket!.on('users_list', (data) {
                if (mounted) setState(() => activeUsersList = List<Map<String, dynamic>>.from(data));
              });
            }

            @override
            Widget build(BuildContext context) {
              final List<Widget> screens = [
                HomeScreen(isConnected: _isConnected, ipController: _ipController, nameController: _nameController, onConnect: connectToServer),
                const FileSharingHubScreen(), 
                const ProfileScreen()
              ];
              return Scaffold(
                body: screens[_currentIndex],
                bottomNavigationBar: BottomNavigationBar(
                  currentIndex: _currentIndex, onTap: (index) => setState(() => _currentIndex = index),
                  selectedItemColor: const Color(0xFF1877F2), unselectedItemColor: Colors.grey, backgroundColor: const Color(0xFF242526), type: BottomNavigationBarType.fixed,
                  items: const [
                    BottomNavigationBarItem(icon: Icon(Icons.wifi), label: 'الشبكة'),
                    BottomNavigationBarItem(icon: Icon(Icons.folder_shared), label: 'توزيع الملفات'),
                    BottomNavigationBarItem(icon: Icon(Icons.account_circle), label: 'الملف الشخصي'),
                  ],
                ),
              );
            }
          }

          class HomeScreen extends StatelessWidget {
            final bool isConnected; final TextEditingController ipController; final TextEditingController nameController; final VoidCallback onConnect;
            const HomeScreen({super.key, required this.isConnected, required this.ipController, required this.nameController, required this.onConnect});
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('بوابة التحكم بالشبكة'), backgroundColor: const Color(0xFF242526)),
                body: Padding(
                  padding: const EdgeInsets.all(16.0),
                  child: Column(
                    children: [
                      Container(
                        padding: const EdgeInsets.all(16),
                        decoration: BoxDecoration(color: isConnected ? Colors.green.withOpacity(0.15) : Colors.red.withOpacity(0.15), borderRadius: BorderRadius.circular(12), border: Border.all(color: isConnected ? Colors.green : Colors.red)),
                        child: Row(children: [Icon(isConnected ? Icons.gpp_good : Icons.gpp_bad, color: isConnected ? Colors.green : Colors.red), const SizedBox(width: 12), Text(isConnected ? 'متصل بنظام المشاركة المحلي' : 'غير متصل بسيرفر الواي فاي', style: const TextStyle(fontWeight: FontWeight.bold))]),
                      ),
                      const SizedBox(height: 16),
                      TextField(controller: nameController, decoration: const InputDecoration(labelText: 'اسمك المستعار في الشبكة', border: OutlineInputBorder())),
                      const SizedBox(height: 12),
                      TextField(controller: ipController, decoration: const InputDecoration(labelText: 'عنوان IP السيرفر المستضيف', border: OutlineInputBorder())),
                      const SizedBox(height: 16),
                      ElevatedButton(style: ElevatedButton.styleFrom(minimumSize: const Size.fromHeight(50), backgroundColor: const Color(0xFF1877F2)), onPressed: onConnect, child: const Text('الاتصال والمزامنة الآن', style: TextStyle(color: Colors.white))),
                    ],
                  ),
                ),
              );
            }
          }

          class FileSharingHubScreen extends StatefulWidget {
            const FileSharingHubScreen({super.key});
            @override
            State<FileSharingHubScreen> createState() => _FileSharingHubScreenState();
          }

          class _FileSharingHubScreenState extends State<FileSharingHubScreen> {
            List<dynamic> _sharedFiles = []; bool _loading = false;

            @override
            void initState() { super.initState(); _refreshFiles(); }

            Future<void> _refreshFiles() async {
              setState(() => _loading = true);
              try {
                final res = await http.get(Uri.parse('http://$currentServerIp:4000/files-list'));
                if (res.statusCode == 200) setState(() => _sharedFiles = jsonDecode(res.body));
              } catch (e) { debugPrint("خطأ استرجاع الملفات: $e"); }
              setState(() => _loading = false);
            }

            Future<void> _pickAndUploadFile() async {
              FilePickerResult? pickResult = await FilePicker.platform.pickFiles();
              if (pickResult != null && pickResult.files.single.path != null) {
                ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('جارٍ رفع الملف عبر الواي فاي محلياً...')));
                try {
                  var request = http.MultipartRequest('POST', Uri.parse('http://$currentServerIp:4000/upload-file'));
                  request.files.add(await http.MultipartFile.fromPath('file', pickResult.files.single.path!));
                  var response = await request.send();
                  if (response.statusCode == 200) {
                    _refreshFiles();
                    if(mounted) ScaffoldMessenger.of(context).showSnackBar(const SnackBar(content: Text('تم رفع الملف بنجاح! 🚀')));
                  }
                } catch (e) {
                  if(mounted) ScaffoldMessenger.of(context).showSnackBar(SnackBar(content: Text('فشل الرفع: $e')));
                }
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('مركز مشاركة الملفات المحلية'), backgroundColor: const Color(0xFF242526), actions: [IconButton(icon: const Icon(Icons.refresh), onPressed: _refreshFiles)]),
                body: _loading 
                    ? const Center(child: CircularProgressIndicator()) 
                    : _sharedFiles.isEmpty 
                        ? const Center(child: Text('لا توجد ملفات مشتركة حالياً بالشبكة'))
                        : ListView.builder(
                            itemCount: _sharedFiles.length,
                            itemBuilder: (context, index) {
                              final file = _sharedFiles[index];
                              return ListTile(
                                leading: const Icon(Icons.insert_drive_file, color: Color(0xFF1877F2)),
                                title: Text(file['name'] ?? 'ملف غير معروف'),
                                subtitle: Text('الحجم: ${file['size'] ?? 'غير معروف'}'),
                                trailing: IconButton(icon: const Icon(Icons.download), onPressed: () {}),
                              );
                            },
                          ),
                floatingActionButton: FloatingActionButton(onPressed: _pickAndUploadFile, backgroundColor: const Color(0xFF1877F2), child: const Icon(Icons.add, color: Colors.white)),
              );
            }
          }

          class ProfileScreen extends StatefulWidget {
            const ProfileScreen({super.key});
            @override
            State<ProfileScreen> createState() => _ProfileScreenState();
          }

          class _ProfileScreenState extends State<ProfileScreen> {
            final ImagePicker _picker = ImagePicker();
            Future<void> _pickImage(bool isProfile) async {
              final XFile? image = await _picker.pickImage(source: ImageSource.gallery, imageQuality: 50);
              if (image != null) {
                final bytes = await File(image.path).readAsBytes();
                setState(() { isProfile ? myProfileB64 = base64Encode(bytes) : myCoverB64 = base64Encode(bytes); });
              }
            }
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('الملف الشخصي الشبكي'), backgroundColor: const Color(0xFF242526)),
                body: SingleChildScrollView(
                  child: Column(
                    children: [
                      GestureDetector(
                        onTap: () => _pickImage(false), 
                        child: Container(height: 180, color: Colors.grey[800], child: myCoverB64 != null ? Image.memory(base64Decode(myCoverB64!), fit: BoxFit.cover, width: double.infinity) : const Center(child: Icon(Icons.add_a_photo, size: 40, color: Colors.white54)))),
                      const SizedBox(height: -50),
                      GestureDetector(
                        onTap: () => _pickImage(true), 
                        child: CircleAvatar(radius: 50, backgroundColor: const Color(0xFF242526), child: CircleAvatar(radius: 46, backgroundImage: myProfileB64 != null ? MemoryImage(base64Decode(myProfileB64!)) : null))),
                      const SizedBox(height: 16),
                      Text(myUsername, style: const TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                      const Text('مستخدم نشط بالشبكة المحلية', style: TextStyle(color: Colors.grey)),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

      - name: 🛠️ Setup build.gradle.kts
        run: |
          cat << 'EOF' > android/app/build.gradle.kts
          plugins { id("com.android.application"); id("kotlin-android"); id("dev.flutter.flutter-gradle-plugin") }
          android {
            namespace = "com.example.rabahdj_local_app"
            compileSdk = 36
            defaultConfig { applicationId = "com.example.rabahdj_local_app"; minSdk = 24; targetSdk = 34; versionCode = 1; versionName = "1.0.0" }
          }
          EOF

      - name: 🎨 Inject Branding
        run: |
          sed -i 's/android:label=".*"/android:label="RabahDj App"/' android/app/src/main/AndroidManifest.xml
          sudo apt-get install -y imagemagick
          convert -size 512x512 xc:#1877F2 -fill white -font DejaVu-Sans-Bold -pointsize 300 -gravity center -draw "text 0,0 'R'" icon.png
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: ⚡ Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RabahDj-App
          path: build/app/outputs/flutter-apk/app-release.apk
