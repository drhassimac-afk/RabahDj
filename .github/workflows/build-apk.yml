name: Generate and Build Clean Flutter App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🏗️ Create Fresh Flutter Project
        run: |
          rm -rf * .gitignore
          flutter create clean_app --org com.example --project-name rabahdj_local_app --platforms=android
          mv clean_app/* .
          mv clean_app/.[!.]* .
          rm -rf clean_app

      - name: 📝 Inject Target pubspec.yaml Dependencies
        run: |
          sed -i '/dependencies:/a \  flutter_local_notifications: ^22.0.1\n  socket_io_client: ^3.1.1\n  uuid: ^4.3.3\n  video_player: ^2.9.2\n  http: ^1.2.0\n  image_picker: ^1.1.2\n  file_picker: ^8.1.4' pubspec.yaml

      - name: 📲 Inject Ultra App UI with Profile & WiFi Local Share
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_local_notifications/flutter_local_notifications.dart';
          import 'package:socket_io_client/socket_io_client.dart' as IO;
          import 'package:uuid/uuid.dart';
          import 'package:http/http.dart' as http;
          import 'package:image_picker/image_picker.dart';
          import 'package:file_picker/file_picker.dart';
          import 'dart:convert';
          import 'dart:io';

          final FlutterLocalNotificationsPlugin _localNotificationsPlugin = FlutterLocalNotificationsPlugin();
          late IO.Socket socket;
          String currentServerIp = "192.168.1.10";
          List<Map<String, dynamic>> globalChatMessages = [];
          String myUsername = "مستخدم محلي";
          String? myProfileB64;
          String? myCoverB64;

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            const AndroidInitializationSettings initializationSettingsAndroid = AndroidInitializationSettings('@mipmap/ic_launcher');
            const InitializationSettings initializationSettings = InitializationSettings(android: initializationSettingsAndroid);
            await _localNotificationsPlugin.initialize(initializationSettings);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFF1877F2), brightness: Brightness.dark), useMaterial3: true),
                home: const MainNavigationScreen(),
              );
            }
          }

          class MainNavigationScreen extends StatefulWidget {
            const MainNavigationScreen({super.key});
            @override
            State<MainNavigationScreen> createState() => _MainNavigationScreenState();
          }

          class _MainNavigationScreenState extends State<MainNavigationScreen> {
            int _currentIndex = 0;
            final List<Widget> _screens = [const HomeScreen(), const ChatScreen(), const LocalShareScreen(), const ProfileScreen()];
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: _screens[_currentIndex],
                bottomNavigationBar: BottomNavigationBar(
                  currentIndex: _currentIndex,
                  onTap: (index) => setState(() => _currentIndex = index),
                  selectedItemColor: const Color(0xFF1877F2),
                  unselectedItemColor: Colors.grey,
                  type: BottomNavigationBarType.fixed,
                  items: const [BottomNavigationBarItem(icon: Icon(Icons.home), label: 'الرئيسية'), BottomNavigationBarItem(icon: Icon(Icons.chat_bubble), label: 'الدردشة'), BottomNavigationBarItem(icon: Icon(Icons.folder_shared), label: 'مشاركة'), BottomNavigationBarItem(icon: Icon(Icons.person), label: 'حسابي')],
                ),
              );
            }
          }

          class HomeScreen extends StatefulWidget {
            const HomeScreen({super.key});
            @override
            State<HomeScreen> createState() => _HomeScreenState();
          }

          class _HomeScreenState extends State<HomeScreen> {
            @override
            Widget build(BuildContext context) {
              return Scaffold(appBar: AppBar(title: const Text('RabahDj Local')), body: const Center(child: Text('الشبكة الرئيسية')));
            }
          }

          class ChatScreen extends StatelessWidget { const ChatScreen({super.key}); @override Widget build(BuildContext context) => Scaffold(appBar: AppBar(title: const Text('الدردشة'))); }
          class LocalShareScreen extends StatelessWidget { const LocalShareScreen({super.key}); @override Widget build(BuildContext context) => Scaffold(appBar: AppBar(title: const Text('مشاركة الملفات'))); }

          class ProfileScreen extends StatefulWidget { const ProfileScreen({super.key}); @override State<ProfileScreen> createState() => _ProfileScreenState(); }
          class _ProfileScreenState extends State<ProfileScreen> {
            final ImagePicker _picker = ImagePicker();
            Future<void> _pickImage(bool isProfile) async {
              final XFile? image = await _picker.pickImage(source: ImageSource.gallery, imageQuality: 50);
              if (image != null) {
                final bytes = await File(image.path).readAsBytes();
                setState(() { isProfile ? myProfileB64 = base64Encode(bytes) : myCoverB64 = base64Encode(bytes); });
              }
            }
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SingleChildScrollView(
                  child: Column(children: [
                    GestureDetector(onTap: () => _pickImage(false), child: Container(height: 180, color: Colors.grey[800], child: myCoverB64 != null ? Image.memory(base64Decode(myCoverB64!), fit: BoxFit.cover) : const Center(child: Icon(Icons.add_a_photo, size: 40, color: Colors.white54)))),
                    GestureDetector(onTap: () => _pickImage(true), child: CircleAvatar(radius: 50, backgroundImage: myProfileB64 != null ? MemoryImage(base64Decode(myProfileB64!)) : null)),
                  ]),
                ),
              );
            }
          }
          EOF

      - name: 🛠️ Setup build.gradle.kts
        run: |
          cat << 'EOF' > android/app/build.gradle.kts
          plugins { id("com.android.application"); id("kotlin-android"); id("dev.flutter.flutter-gradle-plugin") }
          android {
            namespace = "com.example.rabahdj_local_app"
            compileSdk = 36
            defaultConfig { applicationId = "com.example.rabahdj_local_app"; minSdk = 23; targetSdk = 34; versionCode = 1; versionName = "1.0.0" }
          }
          EOF

      - name: 🎨 Inject Branding
        run: |
          sed -i 's/android:label=".*"/android:label="RabahDj App"/' android/app/src/main/AndroidManifest.xml
          sudo apt-get install -y imagemagick
          convert -size 512x512 xc:#1877F2 -fill white -font DejaVu-Sans-Bold -pointsize 300 -gravity center -draw "text 0,0 'R'" icon.png
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi
          convert icon.png -resize 192x192 android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: ⚡ Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RabahDj-App
          path: build/app/outputs/flutter-apk/app-release.apk
