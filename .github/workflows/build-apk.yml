 name: Generate and Build Clean Flutter App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🏗️ Create Fresh Flutter Project
        run: |
          rm -rf * .gitignore
          flutter create clean_app --org com.example --project-name rabahdj_local_app --platforms=android
          mv clean_app/* .
          mv clean_app/.[!.]* .
          rm -rf clean_app

      - name: 📝 Inject Target pubspec.yaml Dependencies
        run: |
          sed -i '/dependencies:/a \  flutter_local_notifications: ^22.0.1\n  socket_io_client: ^3.1.1\n  uuid: ^4.3.3\n  video_player: ^2.9.2\n  flutter_webrtc: ^0.12.3' pubspec.yaml

      - name: 🔏 Inject Android Permissions (Camera & Microphone)
        run: |
          PERMISSIONS='<uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />'
          sed -i "/<manifest/a \    $PERMISSIONS" android/app/src/main/AndroidManifest.xml

      - name: 📲 Inject Ultimate Social UI (Fixed WebRTC Placeholder)
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_local_notifications/flutter_local_notifications.dart';
          import 'package:socket_io_client/socket_io_client.dart' as IO;
          import 'package:uuid/uuid.dart';
          import 'package:video_player/video_player.dart';
          import 'package:flutter_webrtc/flutter_webrtc.dart';

          final FlutterLocalNotificationsPlugin _localNotificationsPlugin = FlutterLocalNotificationsPlugin();
          late IO.Socket socket;
          String currentServerIp = "192.168.1.10";

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            const AndroidInitializationSettings initializationSettingsAndroid = AndroidInitializationSettings('@mipmap/ic_launcher');
            const InitializationSettings initializationSettings = InitializationSettings(android: initializationSettingsAndroid);
            await _localNotificationsPlugin.initialize(settings: initializationSettings);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFF1877F2)),
                  useMaterial3: true,
                ),
                home: const MainNavigationScreen(),
              );
            }
          }

          class MainNavigationScreen extends StatefulWidget {
            const MainNavigationScreen({super.key});
            @override
            State<MainNavigationScreen> createState() => _MainNavigationScreenState();
          }

          class _MainNavigationScreenState extends State<MainNavigationScreen> {
            int _currentIndex = 0;
            final List<Widget> _screens = [
              const HomeScreen(),
              const ReelsScreen(),
              const VideoCallScreen(),
            ];

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: _screens[_currentIndex],
                bottomNavigationBar: BottomNavigationBar(
                  currentIndex: _currentIndex,
                  onTap: (index) {
                    setState(() { _currentIndex = index; });
                  },
                  selectedItemColor: const Color(0xFF1877F2),
                  items: const [
                    BottomNavigationBarItem(icon: Icon(Icons.home), label: 'الرئيسية'),
                    BottomNavigationBarItem(icon: Icon(Icons.movie_filter), label: 'ريلز'),
                    BottomNavigationBarItem(icon: Icon(Icons.video_call), label: 'مكالمة فيديو'),
                  ],
                ),
              );
            }
          }

          // --- شاشة المنشورات ---
          class HomeScreen extends StatefulWidget {
            const HomeScreen({super.key});
            @override
            State<HomeScreen> createState() => _HomeScreenState();
          }

          class _HomeScreenState extends State<HomeScreen> {
            final TextEditingController _ipController = TextEditingController(text: currentServerIp);
            final TextEditingController _postController = TextEditingController();
            final List<Map<String, dynamic>> _posts = [];
            bool _isConnected = false;
            int _onlineCount = 1;

            void _connectToLocalServer() {
              currentServerIp = _ipController.text.trim();
              String serverUrl = "http://$currentServerIp:4000";
              
              socket = IO.io(serverUrl, IO.OptionBuilder()
                .setTransports(['websocket'])
                .disableAutoConnect()
                .build());

              socket.connect();

              socket.onConnect((_) {
                setState(() { _isConnected = true; });
                _triggerLocalNotification('تم الاتصال!', 'أنت متصل بالشبكة المحلية لـ RabahDj 🌐');
              });

              socket.onDisconnect((_) {
                setState(() { _isConnected = false; });
              });

              socket.on('newPost', (data) {
                setState(() { _posts.insert(0, Map<String, dynamic>.from(data)); });
                _triggerLocalNotification('منشور جديد!', data['text'] ?? '');
              });

              socket.on('updateOnlineCount', (count) {
                setState(() { _onlineCount = count; });
              });
            }

            void _submitPost() {
              if (_postController.text.trim().isEmpty) return;
              final newPost = {
                'id': const Uuid().v4(),
                'username': 'مستخدم محلي',
                'text': _postController.text.trim(),
                'likes': 0,
                'timestamp': 'الآن'
              };

              if (_isConnected) {
                socket.emit('createPost', newPost);
              } else {
                setState(() { _posts.insert(0, newPost); });
              }
              _postController.clear();
            }

            Future<void> _triggerLocalNotification(String title, String body) async {
              const AndroidNotificationDetails androidDetails = AndroidNotificationDetails(
                'rabahdj_channels', 'RabahDj', importance: Importance.max, priority: Priority.high
              );
              await _localNotificationsPlugin.show(
                id: DateTime.now().millisecond, title: title, body: body, notificationDetails: const NotificationDetails(android: androidDetails),
              );
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: const Color(0xFFF0F2F5),
                appBar: AppBar(
                  backgroundColor: const Color(0xFF1877F2),
                  title: const Text('RabahDj Local Network', style: TextStyle(color: Colors.white, fontWeight: FontWeight.bold)),
                  actions: [
                    Padding(
                      padding: const EdgeInsets.symmetric(horizontal: 12.0),
                      child: Center(child: Text(_isConnected ? '🟢 متصل ($_onlineCount)' : '🔴 منفصل', style: const TextStyle(color: Colors.white))),
                    )
                  ],
                ),
                body: Column(
                  children: [
                    Container(
                      color: Colors.white,
                      padding: const EdgeInsets.all(10.0),
                      child: Row(
                        children: [
                          Expanded(
                            child: TextField(
                              controller: _ipController,
                              decoration: const InputDecoration(labelText: 'عنوان IP السيرفر', border: OutlineInputBorder(), isDense: true),
                            ),
                          ),
                          const SizedBox(width: 10),
                          ElevatedButton(
                            style: ElevatedButton.styleFrom(backgroundColor: const Color(0xFF1877F2)),
                            onPressed: _connectToLocalServer,
                            child: const Text('ربط', style: TextStyle(color: Colors.white)),
                          )
                        ],
                      ),
                    ),
                    const SizedBox(height: 8),
                    Container(
                      color: Colors.white,
                      padding: const EdgeInsets.all(12.0),
                      child: Row(
                        children: [
                          const CircleAvatar(backgroundColor: Color(0xFF1877F2), child: Icon(Icons.person, color: Colors.white)),
                          const SizedBox(width: 12),
                          Expanded(child: TextField(controller: _postController, decoration: const InputDecoration(hintText: 'بماذا تفكر الآن؟', border: InputBorder.none))),
                          IconButton(icon: const Icon(Icons.send, color: Color(0xFF1877F2)), onPressed: _submitPost)
                        ],
                      ),
                    ),
                    Expanded(
                      child: _posts.isEmpty
                          ? const Center(child: Text('لا توجد منشورات حالياً.'))
                          : ListView.builder(
                              itemCount: _posts.length,
                              itemBuilder: (context, index) {
                                final post = _posts[index];
                                return Card(
                                  margin: const EdgeInsets.symmetric(vertical: 5, horizontal: 10),
                                  color: Colors.white,
                                  child: Padding(
                                    padding: const EdgeInsets.all(12.0),
                                    child: Column(
                                      crossAxisAlignment: CrossAxisAlignment.start,
                                      children: [
                                        Text(post['username'], style: const TextStyle(fontWeight: FontWeight.bold)),
                                        const SizedBox(height: 10),
                                        Text(post['text'] ?? ''),
                                      ],
                                    ),
                                  ),
                                );
                              },
                            ),
                    ),
                  ],
                ),
              );
            }
          }

          // --- شاشة الريلز ---
          class ReelsScreen extends StatelessWidget {
            const ReelsScreen({super.key});
            @override
            Widget build(BuildContext context) {
              final List<String> localReelsUrls = [
                "http://$currentServerIp:4000/videos/reel1.mp4",
                "http://$currentServerIp:4000/videos/reel2.mp4",
                "http://$currentServerIp:4000/videos/reel3.mp4",
              ];
              return Scaffold(
                backgroundColor: Colors.black,
                body: PageView.builder(
                  scrollDirection: Axis.vertical,
                  itemCount: localReelsUrls.length,
                  itemBuilder: (context, index) {
                    return ReelVideoPlayer(videoUrl: localReelsUrls[index], reelIndex: index + 1);
                  },
                ),
              );
            }
          }

          class ReelVideoPlayer extends StatefulWidget {
            final String videoUrl;
            final int reelIndex;
            const ReelVideoPlayer({super.key, required this.videoUrl, required this.reelIndex});
            @override
            State<ReelVideoPlayer> createState() => _ReelVideoPlayerState();
          }

          class _ReelVideoPlayerState extends State<ReelVideoPlayer> {
            late VideoPlayerController _controller;
            bool _isInitialized = false;
            @override
            void initState() {
              super.initState();
              _controller = VideoPlayerController.networkUrl(Uri.parse(widget.videoUrl))
                ..initialize().then((_) {
                  setState(() {
                    _isInitialized = true;
                    _controller.setLooping(true);
                    _controller.play();
                  });
                });
            }
            @override
            void dispose() { _controller.dispose(); super.dispose(); }
            @override
            Widget build(BuildContext context) {
              return Stack(
                fit: StackFit.expand,
                children: [
                  _isInitialized ? AspectRatio(aspectRatio: _controller.value.aspectRatio, child: VideoPlayer(_controller)) : const Center(child: CircularProgressIndicator(color: Colors.white)),
                  Positioned(left: 15, bottom: 30, child: Text('فيديو محلي #${widget.reelIndex}\nبث مباشر عبر الواي فاي بسرعة 0MB', style: const TextStyle(color: Colors.white, fontWeight: FontWeight.bold))),
                ],
              );
            }
          }

          // --- شاشة مكالمات الفيديو المصححة والمطابقة لـ 2026 ---
          class VideoCallScreen extends StatefulWidget {
            const VideoCallScreen({super.key});
            @override
            State<VideoCallScreen> createState() => _VideoCallScreenState();
          }

          class _VideoCallScreenState extends State<VideoCallScreen> {
            final RTCVideoRenderer _localRenderer = RTCVideoRenderer();
            final RTCVideoRenderer _remoteRenderer = RTCVideoRenderer();
            MediaStream? _localStream;
            bool _inCall = false;
            bool _hasRemoteVideo = false;

            @override
            void initState() {
              super.initState();
              _initRenderers();
            }

            void _initRenderers() async {
              await _localRenderer.initialize();
              await _remoteRenderer.initialize();
            }

            @override
            void dispose() {
              _localRenderer.dispose();
              _remoteRenderer.dispose();
              super.dispose();
            }

            void _startCall() async {
              final Map<String, dynamic> mediaConstraints = {
                'audio': true,
                'video': {'facingMode': 'user'}
              };

              _localStream = await navigator.mediaDevices.getUserMedia(mediaConstraints);
              _localRenderer.srcObject = _localStream;

              setState(() {
                _inCall = true;
              });

              try {
                socket.emit('startVideoCall', {'status': 'calling'});
              } catch (_) {}
            }

            void _endCall() {
              _localStream?.getTracks().forEach((track) => track.stop());
              _localRenderer.srcObject = null;
              setState(() {
                _inCall = false;
                _hasRemoteVideo = false;
              });
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                backgroundColor: Colors.grey[900],
                appBar: AppBar(title: const Text('مكالمات فيديو P2P (بدون إنترنت)'), backgroundColor: const Color(0xFF1877F2)),
                body: Column(
                  children: [
                    Expanded(
                      child: Stack(
                        children: [
                          // التعديل والإصلاح: استخدام Stack وشرط برمجى بدلاً من باراميتر placeholder المرفوض
                          Positioned.fill(
                            child: _hasRemoteVideo 
                                ? RTCVideoView(_remoteRenderer)
                                : Container(color: Colors.black54, child: const Center(child: Text('بانتظار طرف آخر في الواي فاي...', style: TextStyle(color: Colors.white, fontSize: 16)))),
                          ),
                          Positioned(
                            right: 20, top: 20, width: 120, height: 160,
                            child: Container(
                              decoration: BoxDecoration(border: Border.all(color: Colors.white24, width: 2), color: Colors.black),
                              child: RTCVideoView(_localRenderer, mirror: true),
                            ),
                          ),
                        ],
                      ),
                    ),
                    Padding(
                      padding: const EdgeInsets.all(20.0),
                      child: Row(
                        mainAxisAlignment: MainAxisAlignment.center,
                        children: [
                          _inCall
                              ? FloatingActionButton(onPressed: _endCall, backgroundColor: Colors.red, child: const Icon(Icons.call_end, color: Colors.white))
                              : FloatingActionButton(onPressed: _startCall, backgroundColor: Colors.green, child: const Icon(Icons.video_call, color: Colors.white)),
                        ],
                      ),
                    )
                  ],
                ),
              );
            }
          }
          EOF

      - name: 🛠️ Force Overwrite build.gradle.kts with AGP 9.0+ Specifications
        run: |
          cat << 'EOF' > android/app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }

          configure<com.android.build.api.dsl.ApplicationExtension> {
              namespace = "com.example.rabahdj_local_app"
              compileSdk = 36

              compileOptions {
                  isCoreLibraryDesugaringEnabled = true
                  sourceCompatibility = JavaVersion.VERSION_1_8
                  targetCompatibility = JavaVersion.VERSION_1_8
              }

              tasks.withType<org.jetbrains.kotlin.gradle.tasks.KotlinCompile>().configureEach {
                  compilerOptions {
                      jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_1_8)
                  }
              }

              defaultConfig {
                  applicationId = "com.example.rabahdj_local_app"
                  minSdk = 21
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }

          flutter {
              source = "../.."
          }

          dependencies {
              coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
          }
          EOF

      - name: 📦 Install Flutter Packages
        run: flutter pub get

      - name: ⚡ Build Production Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: 📤 Upload Final APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RabahDj-Flutter-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7


