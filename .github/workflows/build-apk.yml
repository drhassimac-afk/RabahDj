name: Generate and Build Clean Flutter App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🏗️ Create Fresh Flutter Project
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' -exec rm -rf {} +
          flutter create . --org com.example --project-name rabahdj_local_app --platforms=android --overwrite

      - name: 📝 Inject Target pubspec.yaml Dependencies
        run: |
          echo "" | base64 -d > pubspec.yaml

      - name: 📲 Inject Full Flutter Source Code (Secure Base64 Payload)
        run: |
          # Reconstitution complète du fichier lib/main.dart sans chaînes de texte brutes
          echo "" > lib/main_base.txt
          echo "" | base64 -d > lib/main.dart
          cat lib/main_base.txt | base64 -d >> lib/main.dart
          echo "" | base64 -d >> lib/main.dart
