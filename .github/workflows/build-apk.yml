name: Build React Native Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: 📦 Install Dependencies
        run: |
          cd app
          npm install --legacy-peer-deps

      - name: 🧹 Clean Previous Native Directories
        run: |
          rm -rf app/android

      - name: 🏗️ Generate Android Folder (Expo Prebuild)
        run: |
          cd app
          npx expo prebuild --platform android

      # خطوة حاسمة: إنشاء مجلد الـ assets للأندرويد مسبقاً لمنع أخطاء الحفظ
      - name: 📂 Create Android Assets Directory
        run: |
          mkdir -p app/android/app/src/main/assets

      # البديل الرسمي من Expo لتوليد ملف الـ JS وضخه إجبارياً داخل نسخة الـ Debug
      - name: 📦 Force Generate JS Bundle for Debug (Expo Native Way)
        run: |
          cd app
          npx expo export:embed --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res

      - name: 🚀 Build Android Debug APK (With Injected JS)
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false"
        run: |
          cd app/android
          ./gradlew clean assembleDebug --no-daemon

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RabahDj-App-Debug
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
