name: Generate and Build Clean Flutter App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🏗️ Create Fresh Flutter Project
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' -exec rm -rf {} +
          flutter create . --org com.example --project-name rabahdj_local_app --platforms=android --overwrite

      - name: 📝 Inject Target pubspec.yaml Dependencies
        run: |
          cat << 'EOF' > pubspec.yaml
          name: rabahdj_local_app
          description: "Advanced Local Social Network with E2EE & Self-Destruct Messages."
          publish_to: 'none'
          version: 1.5.0+6

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            flutter_local_notifications: ^22.0.1
            socket_io_client: ^3.1.1
            uuid: ^4.3.3
            video_player: ^2.9.2
            http: ^1.2.0
            image_picker: ^1.1.2
            file_picker: ^8.1.4
            sqflite: ^2.3.0
            path: ^1.8.3
            nsd: ^1.2.2
            encrypt: ^5.0.3

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: 📲 Inject Ultra App UI with Self-Destruct Private Chat
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_local_notifications/flutter_local_notifications.dart';
          import 'package:socket_io_client/socket_io_client.dart' as IO;
          import 'package:uuid/uuid.dart';
          import 'package:http/http.dart' as http;
          import 'package:image_picker/image_picker.dart';
          import 'package:file_picker/file_picker.dart';
          import 'package:nsd/nsd.dart' as nsd;
          import 'package:encrypt/encrypt.dart' as enc;
          import 'dart:convert';
          import 'dart:io';
          import 'dart:async';

          final FlutterLocalNotificationsPlugin _localNotificationsPlugin = FlutterLocalNotificationsPlugin();
          IO.Socket? socket;
          String currentServerIp = "192.168.1.10";
          List<Map<String, dynamic>> localFeedPosts = []; 
          List<Map<String, dynamic>> activeUsersWithIds = []; 
          Map<String, List<Map<String, dynamic>>> privateMessages = {}; 
          String myUsername = "مستخدم محلي";
          String? myProfileB64;

          final encKey = enc.Key.fromUtf8('my32bytesecretkeyforrabahdjlocal'); 
          final encIv = enc.IV.fromUtf8('16byteslonginitiv'); 

          String encryptText(String plainText) {
            final encrypter = enc.Encrypter(enc.AES(encKey));
            return encrypter.encrypt(plainText, iv: encIv).base64;
          }

          String decryptText(String encryptedBase64) {
            try {
              final encrypter = enc.Encrypter(enc.AES(encKey));
              return encrypter.decrypt64(encryptedBase64, iv: encIv);
            } catch (e) { return "[فشل فك التشفير]"; }
          }

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            const AndroidInitializationSettings initializationSettingsAndroid = AndroidInitializationSettings('@mipmap/ic_launcher');
            const InitializationSettings initializationSettings = InitializationSettings(android: initializationSettingsAndroid);
            await _localNotificationsPlugin.initialize(initializationSettings);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFF1877F2), brightness: Brightness.dark),
                  useMaterial3: true, scaffoldBackgroundColor: const Color(0xFF18191A),
                ),
                home: const MainNavigationScreen(),
              );
            }
          }

          class MainNavigationScreen extends StatefulWidget {
            const MainNavigationScreen({super.key});
            @override
            State<MainNavigationScreen> createState() => _MainNavigationScreenState();
          }

          class _MainNavigationScreenState extends State<MainNavigationScreen> {
            int _currentIndex = 0; bool _isConnected = false; bool _isSearching = false;
            final TextEditingController _ipController = TextEditingController(text: currentServerIp);
            final TextEditingController _nameController = TextEditingController(text: myUsername);

            Future<void> startAutoDiscovery() async {
              setState(() { _isSearching = true; });
              try {
                final discovery = await nsd.startDiscovery('_rabahdj._tcp');
                discovery.addListener(() {
                  if (discovery.services.isNotEmpty) {
                    final service = discovery.services.first;
                    if (service.addresses.isNotEmpty) {
                      final foundIp = service.addresses.first.address;
                      nsd.stopDiscovery(discovery);
                      setState(() { _ipController.text = foundIp; _isSearching = false; });
                      connectToServer();
                    }
                  }
                });
                await Future.delayed(const Duration(seconds: 8));
                nsd.stopDiscovery(discovery);
                if (mounted && _isSearching) { setState(() { _isSearching = false; }); }
              } catch (e) { setState(() { _isSearching = false; }); }
            }

            void connectToServer() {
              if (socket != null) { socket!.disconnect(); socket!.dispose(); }
              setState(() { currentServerIp = _ipController.text.trim(); myUsername = _nameController.text.trim(); });

              socket = IO.io('http://$currentServerIp:4000', IO.OptionBuilder().setTransports(['websocket']).disableAutoConnect().build());
              socket!.connect();

              socket!.onConnect((_) {
                setState(() => _isConnected = true);
                socket!.emit('join', {'username': myUsername, 'profile': myProfileB64});
              });
              socket!.onDisconnect((_) => setState(() => _isConnected = false));

              socket!.on('new_post', (data) {
                if (mounted) {
                  setState(() {
                    var decryptedPost = Map<String, dynamic>.from(data);
                    decryptedPost['content'] = decryptText(decryptedPost['content']);
                    localFeedPosts.insert(0, decryptedPost);
                  });
                }
              });

              socket!.on('initial_feed', (data) {
                if (mounted) {
                  setState(() {
                    localFeedPosts = List<Map<String, dynamic>>.from(data).map((post) {
                      post['content'] = decryptText(post['content']); return post;
                    }).toList();
                  });
                }
              });

              socket!.on('post_liked', (data) {
                if (mounted) {
                  setState(() {
                    final index = localFeedPosts.indexWhere((p) => p['id'] == data['postId']);
                    if (index != -1) { localFeedPosts[index]['likes'] = data['likesCount']; }
                  });
                }
              });

              socket!.on('users_list', (data) {
                if (mounted) setState(() => activeUsersWithIds = List<Map<String, dynamic>>.from(data));
              });

              socket!.on('receive_private_message', (data) {
                if (mounted) {
                  setState(() {
                    String senderId = data['senderId'];
                    if (!privateMessages.containsKey(senderId)) { privateMessages[senderId] = []; }
                    String decryptedMsg = decryptText(data['text']);
                    privateMessages[senderId]!.add({
                      'id': data['id'], // المَعرف الفريد للرسالة لتدميرها
                      'sender': data['senderName'],
                      'text': decryptedMsg,
                      'isMe': false,
                      'timer': 5 // مؤقت التدمير الذاتي المبدئي للرسالة المستلمة
                    });
                  });
                }
              });

              // [جديد] استقبال أمر حذف الرسالة الحية من الطرف الآخر وتدميرها فوراً من الشاشة
              socket!.on('destroy_message_event', (data) {
                if (mounted) {
                  setState(() {
                    String fromId = data['fromId'];
                    String msgId = data['msgId'];
                    if (privateMessages.containsKey(fromId)) {
                      privateMessages[fromId]!.removeWhere((m) => m['id'] == msgId);
                    }
                  });
                }
              });
            }

            @override
            Widget build(BuildContext context) {
              final List<Widget> screens = [
                HomeScreen(isConnected: _isConnected, isSearching: _isSearching, ipController: _ipController, nameController: _nameController, onConnect: connectToServer, onAutoDiscover: startAutoDiscovery),
                const FeedScreen(), const PrivateChatsListScreen(), const FileSharingHubScreen()
