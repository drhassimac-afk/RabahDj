name: Generate and Build Clean Flutter App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🏗️ Create Fresh Flutter Project
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' -exec rm -rf {} +
          flutter create . --org com.example --project-name rabahdj_local_app --platforms=android --overwrite

      - name: 📝 Inject Target pubspec.yaml Dependencies
        run: |
          echo "" | base64 -d > pubspec.yaml

      - name: 📲 Inject Full Flutter Source Code (Secure Remote Fetch)
        run: |
          # Récupération sécurisée du code brut (complet et sans coupure)
          curl -sL "https://githubusercontent.com" -o lib/main.dart
          
          # Vérification rapide de l'existence du fichier injecté
          if [ ! -s lib/main.dart ]; then
            echo "Erreur lors de la récupération du code source lib/main.dart"
            exit 1
          fi

      - name: ⚙️ Configure Android MinSDK and Permissions
        run: |
          SED_TARGET="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE"/>\n    <uses-permission android:name="android.permission.CHANGE_WIFI_STATE"/>' $SED_TARGET
          sed -i 's/minSdkVersion .*/minSdkVersion 21/g' android/app/build.gradle

      - name: 📦 Build Android APK Release
        run: flutter build apk --release

      - name: 📤 Upload Build Artifact
        uses: actions/artifacts@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
