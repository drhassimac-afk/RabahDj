name: Build React Native Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26.3.1'  # <--- تطابق كربوني مع جهازك!
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'


      - name: 📦 Install Dependencies
        run: |
          cd app
          npm install --legacy-peer-deps

      - name: 🏗️ Generate Android Folder (Expo Prebuild)
        run: |
          cd app
          npx expo prebuild --platform android

      - name: 🚀 Build Android Release APK
        run: |
          cd app/android
          ./gradlew assembleRelease

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RabahDj-App-Release
          path: app/android/app/build/outputs/apk/release/app-release.apk

