name: Build React Native Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26.3.1'
          cache: 'npm'
          cache-dependency-path: 'app/package-lock.json'

      - name: 📦 Install Dependencies
        run: |
          cd app
          npm install --legacy-peer-deps

      # --- الإضافة الجديدة للتنظيف العميق ---
      - name: 🧹 Clean Native Directories
        run: |
          rm -rf app/android

      - name: 🏗️ Generate Android Folder (Expo Prebuild)
        run: |
          cd app
          npx expo prebuild --platform android

      - name: 🛠️ Force JS Bundle Inside Debug APK
        run: |
          cd app/android/app
          sed -i '/^react {/a\    debuggableVariants = []' build.gradle
          echo "--- تم تطبيق التعديل بنجاح ---"
          grep -A 5 "^react {" build.gradle

      # --- تم إضافة أمر clean هنا لضمان بناء نظيف ---
      - name: 🚀 Build Android Release APK
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -Dorg.gradle.daemon=false"
        run: |
          cd app/android
          ./gradlew clean assembleDebug --no-daemon

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RabahDj-App-Release
          path: app/android/app/build/outputs/apk/debug/app-debug.apk
