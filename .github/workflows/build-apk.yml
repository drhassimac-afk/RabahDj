name: Generate and Build Clean Flutter App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🚀 Setup Flutter Stable
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: 🏗️ Create Fresh Flutter Project
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' -exec rm -rf {} +
          flutter create . --org com.example --project-name rabahdj_local_app --platforms=android --overwrite

         - name: 📝 Inject Target pubspec.yaml Dependencies
        run: |
          cat << 'EOF' > pubspec.yaml
          name: rabahdj_local_app
          description: "A new Advanced Local Social Network."
          publish_to: 'none'
          version: 1.1.0+2

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            flutter_local_notifications: ^22.0.1
            socket_io_client: ^3.1.1
            uuid: ^4.3.3
            video_player: ^2.9.2
            http: ^1.2.0
            image_picker: ^1.1.2
            file_picker: ^8.1.4
            sqflite: ^2.3.0        # لإدارة قاعدة البيانات المحلية على الهاتف
            path: ^1.8.3           # للتعامل مع مسارات ملفات قاعدة البيانات
            nsd: ^1.2.2            # للاكتشاف التلقائي للسيرفر عبر شبكة الـ WiFi

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: 📲 Inject Ultra App UI with Profile & WiFi Local Share
        run: |
          cat << 'EOF' > lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter_local_notifications/flutter_local_notifications.dart';
          import 'package:socket_io_client/socket_io_client.dart' as IO;
          import 'package:uuid/uuid.dart';
          import 'package:http/http.dart' as http;
          import 'package:image_picker/image_picker.dart';
          import 'package:file_picker/file_picker.dart';
          import 'dart:convert';
          import 'dart:io';

          final FlutterLocalNotificationsPlugin _localNotificationsPlugin = FlutterLocalNotificationsPlugin();
          IO.Socket? socket;
          String currentServerIp = "192.168.1.10";
          List<Map<String, dynamic>> globalChatMessages = [];
          List<String> connectedUsers = [];
          String myUsername = "مستخدم محلي";
          String? myProfileB64;
          String? myCoverB64;

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            const AndroidInitializationSettings initializationSettingsAndroid = AndroidInitializationSettings('@mipmap/ic_launcher');
            const InitializationSettings initializationSettings = InitializationSettings(android: initializationSettingsAndroid);
            await _localNotificationsPlugin.initialize(initializationSettings);
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData(colorScheme: ColorScheme.fromSeed(seedColor: const Color(0xFF1877F2), brightness: Brightness.dark), useMaterial3: true),
                home: const MainNavigationScreen(),
              );
            }
          }

          class MainNavigationScreen extends StatefulWidget {
            const MainNavigationScreen({super.key});
            @override
            State<MainNavigationScreen> createState() => _MainNavigationScreenState();
          }

          class _MainNavigationScreenState extends State<MainNavigationScreen> {
            int _currentIndex = 0;
            bool _isConnected = false;
            final TextEditingController _ipController = TextEditingController(text: currentServerIp);
            final TextEditingController _nameController = TextEditingController(text: myUsername);

            void connectToServer() {
              if (socket != null) {
                socket!.disconnect();
                socket!.dispose();
              }

              setState(() {
                currentServerIp = _ipController.text.trim();
                myUsername = _nameController.text.trim();
              });

              // إعداد الاتصال بالـ Socket.io عبر الـ IP المحلي
              socket = IO.io('http://$currentServerIp:4000', IO.OptionBuilder()
                .setTransports(['websocket'])
                .disableAutoConnect()
                .build());

              socket!.connect();

              socket!.onConnect((_) {
                setState(() => _isConnected = true);
                socket!.emit('join', {'username': myUsername, 'profile': myProfileB64});
                _showNotification("تم الاتصال", "أنت متصل الآن بشبكة RabahDj المحلية");
              });

              socket!.onDisconnect((_) {
                setState(() => _isConnected = false);
              });

              // استقبال الرسائل الفورية وتحديث الواجهة
              socket!.on('message', (data) {
                if (mounted) {
                  setState(() {
                    globalChatMessages.add(Map<String, dynamic>.from(data));
                  });
                }
              });

              // استقبال قائمة المستخدمين النشطين على الشبكة المحلية
              socket!.on('users_list', (data) {
                if (mounted) {
                  setState(() {
                    connectedUsers = List<String>.from(data);
                  });
                }
              });
            }

            Future<void> _showNotification(String title, String body) async {
              const AndroidNotificationDetails androidDetails = AndroidNotificationDetails(
                'local_ch_id', 'Local Alerts', channelDescription: 'WiFi Alerts',
                importance: Importance.max, priority: Priority.high);
              await _localNotificationsPlugin.show(0, title, body, const NotificationDetails(android: androidDetails));
            }

            @override
            Widget build(BuildContext context) {
              final List<Widget> screens = [
                HomeScreen(isConnected: _isConnected, ipController: _ipController, nameController: _nameController, onConnect: connectToServer),
                const ChatScreen(),
                const LocalShareScreen(),
                const ProfileScreen()
              ];

              return Scaffold(
                body: screens[_currentIndex],
                bottomNavigationBar: BottomNavigationBar(
                  currentIndex: _currentIndex,
                  onTap: (index) => setState(() => _currentIndex = index),
                  selectedItemColor: const Color(0xFF1877F2),
                  unselectedItemColor: Colors.grey,
                  type: BottomNavigationBarType.fixed,
                  items: const [
                    BottomNavigationBarItem(icon: Icon(Icons.home), label: 'الرئيسية'),
                    BottomNavigationBarItem(icon: Icon(Icons.chat_bubble), label: 'الدردشة'),
                    BottomNavigationBarItem(icon: Icon(Icons.folder_shared), label: 'مشاركة'),
                    BottomNavigationBarItem(icon: Icon(Icons.person), label: 'حسابي')
                  ],
                ),
              );
            }
          }

          // شاشة التحكم في الاتصال وعرض إحصائيات الشبكة والمنشورات
          class HomeScreen extends StatelessWidget {
            final bool isConnected;
            final TextEditingController ipController;
            final TextEditingController nameController;
            final VoidCallback onConnect;

            const HomeScreen({super.key, required this.isConnected, required this.ipController, required this.nameController, required this.onConnect});

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: const Text('RabahDj Local Network'), centerTitle: true),
                body: Padding(
                  padding: const EdgeInsets.all(16.0),
                  child: Column(
                    children: [
                      Card(
                        color: isConnected ? Colors.green.withOpacity(0.2) : Colors.red.withOpacity(0.2),
                        child: ListTile(
                          leading: Icon(isConnected ? Icons.wifi : Icons.wifi_off, color: isConnected ? Colors.green : Colors.red),
                          title: Text(isConnected ? 'متصل بالسيرفر المحلي' : 'غير متصل بالشبكة'),
                          subtitle: Text('المتصلين الآن: ${connectedUsers.length} مستخدم'),
                        ),
                      ),
                      const SizedBox(height: 12),
                      TextField(controller: nameController, decoration: const InputDecoration(labelText: 'اسم المستخدم للشبكة', border: OutlineInputBorder())),
                      const SizedBox(height: 12),
                      TextField(controller: ipController, decoration: const InputDecoration(labelText: 'عنوان IP السيرفر المحلي', border: OutlineInputBorder())),
                      const SizedBox(height: 12),
                      ElevatedButton.icon(
                        style: ElevatedButton.styleFrom(minimumSize: const Size.fromHeight(50), backgroundColor: const Color(0xFF1877F2)),
                        onPressed: onConnect,
                        icon: const Icon(Icons.sync, color: Colors.white),
                        label: Text(isConnected ? 'إعادة الاتصال بالـ WiFi' : 'اتصال بالشبكة المحلية', style: const TextStyle(color: Colors.white)),
                      ),
                      const SizedBox(height: 16),
                      const Divider(),
                      Expanded(
