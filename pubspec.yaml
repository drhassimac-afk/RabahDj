name: rabahdj_local_app
description: "Local Wi-Fi Social Media App by RabahDj"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  http: ^1.2.0
  shared_preferences: ^2.2.0
  video_player: ^2.8.2
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  record:
    git:
      url: https://github.com/llfbandit/record.git
      path: record
  audioplayers: ^6.0.0


flutter:
  uses-material-design: true
